{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Library Dashboard</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f1f3f4;
            --surface: #ffffff;
            --border: #dadce0;
            --text-main: #202124;
            --text-sub: #5f6368;
            --danger: #d93025;
            --success: #1e8e3e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .app-bar {
            background: var(--surface);
            padding: 0 15px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 100;
        }

        .app-bar h1 { font-size: 18px; margin: 0; color: var(--text-main); font-weight: 600; }

        /* TAB NAVIGATION */
        .tab-nav {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            justify-content: center;
        }

        .tab-nav a {
            padding: 16px 20px;
            text-decoration: none;
            color: var(--text-sub);
            font-size: 13px;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .tab-nav a.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* MAIN SCROLL AREA */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .section {
            display: none;
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3);
        }

        .section.active { display: block; animation: fadeIn 0.2s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UNIFORM INPUTS */
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            height: 45px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            background: #fff;
            outline: none;
        }

        input:focus { border: 2px solid var(--primary); padding: 0 11px; }

        .search-row { display: flex; gap: 8px; }
        .btn-search {
            width: 50px;
            background: #3c4043;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            font-size: 15px;
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #323232;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            visibility: hidden;
            z-index: 1000;
            font-size: 14px;
        }
        #toast.show { visibility: visible; }

        /* MOBILE OVERRIDES */
        @media (max-width: 600px) {
            .app-bar h1 { font-size: 16px; }
            .nav-text { display: none; } /* Hide text "Library" but keep icon */
            .main-content { padding: 10px; }
            .section { 
                padding: 20px; 
                max-width: 100%;
            }
            .tab-nav a { flex: 1; text-align: center; padding: 14px 5px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <header class="app-bar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="{% url 'libwebb:admindashboard' %}" style="text-decoration: none; color: var(--text-sub);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
            <h1>Admin Dashboard</h1>
        </div>
        
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="{% url 'libwebb:library' %}" style="text-decoration: none; color: var(--primary); font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 4px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="nav-text">Library</span>
            </a>
            <a href="{% url 'libwebb:logout' %}" style="text-decoration: none; color: var(--danger); font-weight: 600; font-size: 14px;">Sign Out</a>
        </div>
    </header>

    <nav class="tab-nav">
        <a href="#" class="active" data-target="entry">Add Book</a>
        <a href="#" data-target="update">Update</a>
        <a href="#" data-target="delete">Delete</a>
    </nav>

    <main class="main-content">
        <div id="entry" class="section active">
            <form method="POST" action="{% url 'libwebb:add_book' %}">
                {% csrf_token %}
                <div class="field"><label>Title</label><input type="text" name="title" required></div>
                <div class="field"><label>Author</label><input type="text" name="author" required></div>
                <div class="field">
                    <label>Language</label>
                    <select name="language">
                        <option value="Malayalam">Malayalam</option>
                        <option value="English">English</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Sanskrit">Sanskrit</option>
                    </select>
                </div>
                <div class="field">
                    <label>Category</label>
                    <select name="category">
                        <option value="Literature">Literature</option>
                        <option value="Education">Education</option>
                    </select>
                </div>
                <div class="field"><label>Purchase Date</label><input type="date" name="date_of_buy"></div>
                <div class="field"><label>Remarks</label><input type="text" name="remarks"></div>
                <input type="hidden" name="status" value="Available">
                <button type="submit" class="btn-submit">Save Book</button>
            </form>
        </div>

        <div id="update" class="section">
            <form method="POST" action="{% url 'libwebb:update_book' %}">
                {% csrf_token %}
                <div class="field">
                    <label>Find Book (ID or Title)</label>
                    <div class="search-row">
                        <input type="text" id="up_book_id" name="book_id" list="all_books_list" placeholder="Search...">
                        <button type="button" id="search_btn" class="btn-search">🔍</button>
                    </div>
                </div>
                <div class="field"><label>Title</label><input type="text" id="up_title" name="title"></div>
                <div class="field"><label>Author</label><input type="text" id="up_author" name="author"></div>
                <div class="field">
                    <label>Language</label>
                    <select id="up_language" name="language">
                        <option value="Malayalam">Malayalam</option>
                        <option value="English">English</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Sanskrit">Sanskrit</option>
                    </select>
                </div>
                <div class="field">
                    <label>Category</label>
                    <select id="up_category" name="category">
                        <option value="Literature">Literature</option>
                        <option value="Education">Education</option>
                    </select>
                </div>
                <div class="field"><label>Purchase Date</label><input type="date" id="up_date_of_buy" name="date_of_buy"></div>
                <div class="field">
                    <label>Status</label>
                    <select id="up_status" name="status">
                        <option value="Available">Available</option>
                        <option value="Borrowed">Borrowed</option>
                    </select>
                </div>
                <div class="field"><label>Remarks</label><input type="text" id="up_remarks" name="remarks"></div>
                <button type="submit" class="btn-submit" style="background: var(--success);">Update Record</button>
            </form>
        </div>

        <div id="delete" class="section">
            <form method="POST" action="{% url 'libwebb:delete_book' %}">
                {% csrf_token %}
                <div class="field">
                    <label>Select Book to Remove</label>
                    <input type="text" name="book_id" id="del_book_id" list="all_books_list" placeholder="ID Number">
                </div>
                <button type="submit" class="btn-submit" style="background: var(--danger);">Delete Permanently</button>
            </form>
        </div>

        <datalist id="all_books_list"></datalist>
    </main>

    <script>
        document.querySelectorAll('.tab-nav a').forEach(link => {
            link.onclick = (e) => {
                e.preventDefault();
                document.querySelectorAll('.tab-nav a, .section').forEach(el => el.classList.remove('active'));
                link.classList.add('active');
                document.getElementById(link.dataset.target).classList.add('active');
            };
        });

        function loadSuggestions() {
            fetch('{% url "libwebb:get_all_titles" %}')
                .then(r => r.json())
                .then(data => {
                    const dl = document.getElementById('all_books_list');
                    dl.innerHTML = '';
                    data.suggestions.forEach(item => {
                        let opt = document.createElement('option');
                        opt.value = item;
                        dl.appendChild(opt);
                    });
                });
        }

        function setupCleaner(inputId, autoSearch = false) {
            const el = document.getElementById(inputId);
            el.addEventListener('input', function() {
                if (this.value.includes(' - ')) {
                    this.value = this.value.split(' - ')[0].trim();
                    if (autoSearch) document.getElementById('search_btn').click();
                }
            });
        }

        document.getElementById('search_btn').onclick = () => {
            const id = document.getElementById('up_book_id').value;
            if(!id) return;
            fetch('{% url "libwebb:get_book_details" %}?book_id=' + encodeURIComponent(id))
                .then(r => r.json())
                .then(data => {
                    if(data.success) {
                        document.getElementById('up_title').value = data.title;
                        document.getElementById('up_author').value = data.author;
                        document.getElementById('up_language').value = data.language;
                        document.getElementById('up_category').value = data.category;
                        document.getElementById('up_date_of_buy').value = data.date_of_buy;
                        document.getElementById('up_status').value = data.status;
                        document.getElementById('up_remarks').value = data.remarks || "";
                        showToast("Book Loaded");
                    } else { showToast("Not Found"); }
                });
        };

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSuggestions();
            setupCleaner('up_book_id', true);
            setupCleaner('del_book_id', false);
        });
    </script>
</body>
</html>

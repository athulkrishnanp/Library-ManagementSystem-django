{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Library</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #dadce0;
            --text-main: #202124;
            --text-sub: #5f6368;
            --danger: #d93025;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Standardized App Bar */
        .app-bar {
            background: var(--surface);
            height: 64px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .brand-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
        }

        /* Login Container */
        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--surface);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 3px rgba(60,64,67,0.3);
            text-align: center;
        }

        h2 { font-size: 24px; margin-bottom: 8px; font-weight: 500; }
        p { color: var(--text-sub); font-size: 14px; margin-bottom: 30px; }

        /* Form Elements to match Operations Page */
        .field { text-align: left; margin-bottom: 20px; }
        
        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 0 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px; /* Prevents mobile zoom */
            background: #fff;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border: 2px solid var(--primary); padding: 0 14px; }

        button {
            width: 100%;
            height: 48px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover { background: #1557b0; }

        .error-msg {
            background: #fff0f0;
            color: var(--danger);
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        /* Container for the input and the eye */
.password-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

/* Adjust input to make room for the icon on the right */
.password-wrapper input {
    padding-right: 46px; 
}

/* The clickable eye area */
.toggle-btn {
    position: absolute;
    right: 8px;
    height: 32px;
    width: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-sub);
    border-radius: 50%;
    transition: background 0.2s;
    user-select: none;
}

.toggle-btn:hover {
    background: rgba(0,0,0,0.05);
    color: var(--primary);
}

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .app-bar { height: 56px; padding: 0 15px; }
            .login-card { 
                border: none; 
                box-shadow: none; 
                background: transparent; 
                padding: 20px;
            }
            body { background-color: var(--surface); } /* White background for mobile login */
        }
    </style>
</head>
<body>

    <header class="app-bar">
        <a href="/" class="brand-link">
            <svg style="fill: var(--primary);" viewBox="0 0 24 24" width="28" height="28">
                <path d="M12 3L1 9L12 15L21 10.09V17H23V9M5 13.18V17.18L12 21L19 17.18V13.18L12 17L5 13.18Z"/>
            </svg>
            <h1 style="margin:0; font-size: 1.1rem;">Library System</h1>
        </a>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h2>Login</h2>
            <p>Enter your credentials to manage the library</p>

            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{% url 'libwebb:adminlogin' %}">
                {% csrf_token %}
                <div class="field">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Username" required autofocus>
                </div>
    
                <div class="field">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="password" placeholder="Password" required>
                        <span class="toggle-btn" id="eye-toggle">
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </span>
                    </div>
                </div>

                <button type="submit">Sign In</button>
            </form>
        </div>
    </main>
<script>
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('eye-toggle');
    const eyeIcon = document.getElementById('eye-icon');

    toggleBtn.addEventListener('click', () => {
        // Switch the input type
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';

        // Update the icon to show "eye" or "eye with slash"
        if (isPassword) {
            // "Eye Off" Icon (Slash through eye)
            eyeIcon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            `;
        } else {
            // Normal "Eye" Icon
            eyeIcon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            `;
        }
    });
</script>
</body>
</html>

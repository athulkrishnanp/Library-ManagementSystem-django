<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #e0e0e0;
            --text-main: #202124;
            --text-sub: #5f6368;
            --danger: #d93025;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Standardized App Bar */
        .app-bar {
            background: var(--surface);
            height: 64px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left, .header-right { display: flex; align-items: center; gap: 15px; }

        .brand-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
        }

        .signout-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            background: #fff0f0;
            color: var(--danger);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .container { 
    padding: 20px; 
    width: 100%; /* Occupy full width */
    max-width: none; /* Remove the 1200px limit */
    box-sizing: border-box; 
}

        /* Stats Cards */
        .stats-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* Larger minimum width */
    gap: 15px;
    margin-bottom: 25px;
}

        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
        }
        
        .stat-card:hover { transform: translateY(-2px); border-color: var(--primary); }

        .stat-card small { font-size: 0.7rem; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }

        /* Search Panel */
        .search-panel {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .search-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }

        .filter-group { display: flex; flex-direction: column; gap: 6px; }

        label { font-size: 0.7rem; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }

        input, select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        .btn-search { background: var(--primary); color: white; border: none; padding: 11px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-reset { background: #f1f3f4; border: 1px solid var(--border); padding: 11px 15px; border-radius: 8px; cursor: pointer; }

        /* Table */
        .table-wrapper {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow-x: auto;
    width: 100%; /* Ensure it spans the whole container */
}
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { padding: 12px 15px; font-size: 0.7rem; text-transform: uppercase; color: var(--text-sub); background: #f8f9fa; border-bottom: 2px solid var(--border); text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; font-size: 0.9rem; }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-available { background: #e6ffed; color: #28a745; }
        .badge-borrowed { background: #fff5f5; color: #dc3545; }

        @media (max-width: 768px) {
            .search-grid { grid-template-columns: 1fr; }
            .desktop-only { display: none; }
            .app-bar { height: auto; padding: 10px 15px; }
        }
    </style>
</head>
<body>

<header class="app-bar">
    <div class="header-left">
        <a href="{% url 'libwebb:admindashboard' %}" class="brand-link">
            <svg style="fill: var(--primary);" viewBox="0 0 24 24" width="28" height="28">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
            </svg>
            <div class="brand-text">
                <h1 style="margin:0; font-size: 1.1rem;">Library</h1>
                <span style="color: var(--text-sub); font-size: 0.7rem;">Books Catalog</span>
            </div>
        </a>
    </div>

    <div class="header-right">
        <a href="{% url 'libwebb:logout' %}" class="signout-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span class="desktop-only">Sign Out</span>
        </a>
    </div>
</header>

<div class="container">
    <div class="stats-container">
        <div class="stat-card">
            <small>Total Books</small>
            <h2 style="margin: 5px 0 0;">{{ books|length }}</h2>
        </div>
        <a href="{% url 'libwebb:admindashboard' %}" class="stat-card" style="border-left: 4px solid var(--primary);">
            <small>Quick Actions</small>
            <h2 style="margin: 5px 0 0; color: var(--primary); display: flex; align-items: center; gap: 8px;">
                Manage Records 
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
            </h2>
        </a>
    </div>

    <div class="search-panel">
        <div class="search-grid">
            <div class="filter-group">
                <label>Search Catalog</label>
                <input type="text" id="searchInput" list="suggestionList" placeholder="Title, Author, or #ID...">
                <datalist id="suggestionList"></datalist>
            </div>
            
            <div class="filter-group">
                <label>Category</label>
                <select id="catSelect">
                    <option value="ALL">All Categories</option>
                    <option value="Literature">Literature</option>
                    <option value="Education">Education</option>
                    <option value="Science">Science</option>
                    <option value="Novel">Novel</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Status</label>
                <select id="statusSelect">
                    <option value="ALL">All Status</option>
                    <option value="Available">Available</option>
                    <option value="Borrowed">Borrowed</option>
                </select>
            </div>

            <div style="display: flex; gap: 8px;">
                <button class="btn-search" onclick="applyFilters()">🔍</button>
                <button class="btn-reset" onclick="clearFilters()">Reset</button>
            </div>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Language</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Remarks</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr>
                    <td style="font-family: monospace; color: var(--text-sub);">#{{ book.0 }}</td>
                    <td style="font-weight: 600;">{{ book.1 }}</td>
                    <td>{{ book.2 }}</td>
                    <td>{{ book.3 }}</td>
                    <td>{{ book.5 }}</td>
                    <td>
                        <span class="badge {% if book.6|lower == 'available' %}badge-available{% else %}badge-borrowed{% endif %}">
                            {{ book.6 }}
                        </span>
                    </td>
                    <td style="color: #999; font-size: 0.8rem;">{{ book.7 }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    function applyFilters() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const cat = document.getElementById("catSelect").value.toUpperCase();
        const status = document.getElementById("statusSelect").value.toUpperCase();
        const rows = document.querySelectorAll("#mainTable tbody tr");

        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            const rowCat = row.cells[4].innerText.toUpperCase();
            const rowStatus = row.cells[5].innerText.toUpperCase();

            const matchSearch = text.includes(query);
            const matchCat = (cat === "ALL" || rowCat === cat);
            const matchStatus = (status === "ALL" || rowStatus.includes(status));

            row.style.display = (matchSearch && matchCat && matchStatus) ? "" : "none";
        });
    }

    function clearFilters() {
        document.getElementById("searchInput").value = "";
        document.getElementById("catSelect").value = "ALL";
        document.getElementById("statusSelect").value = "ALL";
        applyFilters();
    }

    // Load suggestions from your existing endpoint
    async function loadSuggestions() {
        try {
            const response = await fetch('/libweb/get-all-titles/');
            const data = await response.json();
            const list = document.getElementById('suggestionList');
            list.innerHTML = data.suggestions.map(item => `<option value="${item}">`).join('');
        } catch (e) { console.log("Suggestions failed"); }
    }

    document.addEventListener('DOMContentLoaded', loadSuggestions);
    document.getElementById("searchInput").addEventListener("input", applyFilters);
</script>

</body>
</html>
